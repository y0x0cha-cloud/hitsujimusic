    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
      window.addEventListener("DOMContentLoaded", () => {
        // 1. もともと入っていたAOS（ギャラリー用）を動かす
        if (typeof AOS !== "undefined") {
          AOS.init({
            duration: 800, // 0.8秒かけて動く
            once: true, // 最初の1回だけ動く
          });
        }

        // 2. ★新しく追加：挨拶用のfade-in-boxを動かす仕組み
        const fadeBoxes = document.querySelectorAll(".fade-in-box");
        const observer = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) {
                entry.target.classList.add("is-active");
                observer.unobserve(entry.target); // 1回表示されたら監視終了
              }
            });
          },
          {
            root: null,
            rootMargin: "0px",
            threshold: 0.15, // 画面に15%入ったらふわっとスタート
          },
        );

        fadeBoxes.forEach((box) => {
          observer.observe(box);
        });
      });
    </script>
